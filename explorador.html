<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Armonía Musical - Explorador</title>
    
    <link rel="manifest" href="./manifest.json">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Armonía">
    <link rel="apple-touch-icon" href="./icon-180.png">
    
    <meta name="theme-color" content="#0a0a0d">

    <style>
        :root {
            --bg-principal: #0a0a0d;
            --bg-tarjeta: #13131a;
            --texto-principal: #f0f0f5;
            --texto-secundario: #94a3b8;
            --color-acento: #3b82f6;
            --color-acento-hover: #2563eb;
            --borde: #1e293b;
            --exito: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg-principal);
            color: var(--texto-principal);
            min-height: 100vh;
            padding: 20px;
        }

        header {
            max-width: 800px;
            margin: 0 auto 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-volver {
            color: var(--texto-secundario);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-volver:hover {
            color: var(--texto-principal);
        }

        .contenedor {
            max-width: 800px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }

        @media (min-width: 768px) {
            .contenedor {
                grid-template-columns: 1fr 1fr;
            }
        }

        .tarjeta {
            background-color: var(--bg-tarjeta);
            border: 1px solid var(--borde);
            border-radius: 20px;
            padding: 24px;
        }

        .tarjeta-completa {
            grid-column: 1 / -1;
        }

        h2 {
            font-size: 1.25rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .selector-tonalidad {
            width: 100%;
            padding: 12px;
            background-color: var(--bg-principal);
            border: 1px solid var(--borde);
            border-radius: 10px;
            color: var(--texto-principal);
            font-size: 1rem;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .grilla-grados {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        @media (min-width: 480px) {
            .grilla-grados {
                grid-template-columns: repeat(6, 1fr);
            }
        }

        .grado-box {
            background-color: var(--bg-principal);
            border: 1px solid var(--borde);
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
        }

        .grado-numero {
            font-size: 0.75rem;
            color: var(--texto-secundario);
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .grado-acorde {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .circulo-vacio {
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--texto-secundario);
            border: 2px dashed var(--borde);
            border-radius: 16px;
        }
    </style>
</head>
<body>

    <header>
        <a href="./index.html" class="btn-volver">← Volver</a>
        <h1>Explorador</h1>
    </header>

    <main class="contenedor">
        <section class="tarjeta">
            <h2>Configuración</h2>
            <label for="tonalidad" style="display: block; margin-bottom: 8px; color: var(--texto-secundario); font-size: 0.9rem;">Selecciona una tonalidad principal:</label>
            <select id="tonalidad" class="selector-tonalidad">
                <option value="C">Do Mayor (C)</option>
                <option value="G">Sol Mayor (G)</option>
                <option value="D">Re Mayor (D)</option>
                <option value="A">La Mayor (A)</option>
                <option value="E">Mi Mayor (E)</option>
                <option value="F">Fa Mayor (F)</option>
            </select>
            <p style="font-size: 0.9rem;">Próximamente: Modos griegos y escalas menores.</p>
        </section>

        <section class="tarjeta">
            <h2>Círculo de Quintas</h2>
            <div class="circulo-vacio">
                Visualización en desarrollo
            </div>
        </section>

        <section class="tarjeta tarjeta-completa">
            <h2>Acordes de la Escala (Armonización Diatónica)</h2>
            <div class="grilla-grados" id="contenedor-grados">
                <div class="grado-box">
                    <div class="grado-numero">I</div>
                    <div class="grado-acorde" id="grado-1">C</div>
                </div>
                <div class="grado-box">
                    <div class="grado-numero">II</div>
                    <div class="grado-acorde" id="grado-2">Dm</div>
                </div>
                <div class="grado-box">
                    <div class="grado-numero">III</div>
                    <div class="grado-acorde" id="grado-3">Em</div>
                </div>
                <div class="grado-box">
                    <div class="grado-numero">IV</div>
                    <div class="grado-acorde" id="grado-4">F</div>
                </div>
                <div class="grado-box">
                    <div class="grado-numero">V</div>
                    <div class="grado-acorde" id="grado-5">G</div>
                </div>
                <div class="grado-box">
                    <div class="grado-numero">VI</div>
                    <div class="grado-acorde" id="grado-6">Am</div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // Lógica básica para cambiar acordes según la tonalidad seleccionada
        const escalas = {
            'C': ['C', 'Dm', 'Em', 'F', 'G', 'Am'],
            'G': ['G', 'Am', 'Bm', 'C', 'D', 'Em'],
            'D': ['D', 'Em', 'F#m', 'G', 'A', 'Bm'],
            'A': ['A', 'Bm', 'C#m', 'D', 'E', 'F#m'],
            'E': ['E', 'F#m', 'G#m', 'A', 'B', 'C#m'],
            'F': ['F', 'Gm', 'Am', 'Bb', 'C', 'Dm']
        };

        const selector = document.getElementById('tonalidad');
        
        selector.addEventListener('change', (e) => {
            const ton = e.target.value;
            const acordes = escalas[ton];
            
            if(acordes) {
                for(let i = 1; i <= 6; i++) {
                    document.getElementById(`grado-${i}`).textContent = acordes[i-1];
                }
            }
        });
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => {
                        console.log('Service Worker del Explorador registrado con éxito:', reg.scope);
                    })
                    .catch(err => {
                        console.error('Error al registrar el Service Worker en el Explorador:', err);
                    });
            });
        }
    </script>
</body>
</html>
