<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Armonía Musical</title>
    
    <link rel="manifest" href="/ArmoniaMusical/manifest.json">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Armonía">
    <link rel="apple-touch-icon" href="/ArmoniaMusical/icon-180.png">
    <meta name="theme-color" content="#0f172a">

    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border: #334155;
            --chord-maj: #10b981;
            --chord-min: #3b82f6;
            --chord-dim: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 600px;
            text-align: center;
            margin-bottom: 20px;
            padding: 10px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(to right, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        main {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h2 {
            font-size: 1.1rem;
            margin-bottom: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .selector-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .btn-nota {
            background-color: var(--bg-main);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 12px 4px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .btn-nota:hover {
            border-color: var(--accent);
        }

        .btn-nota.active {
            background-color: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.4);
        }

        .chords-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .chord-box {
            background-color: var(--bg-main);
            border-left: 4px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }

        .chord-box.maj { border-left-color: var(--chord-maj); }
        .chord-box.min { border-left-color: var(--chord-min); }
        .chord-box.dim { border-left-color: var(--chord-dim); }

        .chord-degree {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 2px;
        }

        .chord-name {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .circle-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px 0;
        }

        .circle-svg {
            width: 100%;
            max-width: 280px;
            height: auto;
        }

        .circle-bg {
            fill: none;
            stroke: var(--border);
            stroke-width: 1;
        }

        .circle-line {
            stroke: var(--border);
            stroke-width: 1;
        }

        .circle-text {
            fill: var(--text-muted);
            font-size: 12px;
            font-weight: 600;
            text-anchor: middle;
            dominant-baseline: central;
            cursor: pointer;
            transition: all 0.2s;
        }

        .circle-text:hover {
            fill: var(--text-main);
        }

        .circle-text.active {
            fill: var(--accent);
            font-size: 15px;
            font-weight: 800;
        }
    </style>
</head>
<body>

    <header>
        <h1>Armonía Musical</h1>
        <div class="subtitle">Armonizador y Círculo de Quintas</div>
    </header>

    <main>
        <section class="card">
            <h2>Tonalidad Mayor</h2>
            <div class="selector-grid" id="selector-notas">
                </div>
        </section>

        <section class="card">
            <h2>Acordes Diatónicos</h2>
            <div class="chords-grid" id="grilla-acordes">
                <div class="chord-box maj"><div class="chord-degree">I</div><div class="chord-name" id="ch-1">-</div></div>
                <div class="chord-box min"><div class="chord-degree">ii</div><div class="chord-name" id="ch-2">-</div></div>
                <div class="chord-box min"><div class="chord-degree">iii</div><div class="chord-name" id="ch-3">-</div></div>
                <div class="chord-box maj"><div class="chord-degree">IV</div><div class="chord-name" id="ch-4">-</div></div>
                <div class="chord-box maj"><div class="chord-degree">V</div><div class="chord-name" id="ch-5">-</div></div>
                <div class="chord-box min"><div class="chord-degree">vi</div><div class="chord-name" id="ch-6">-</div></div>
                <div class="chord-box dim"><div class="chord-degree">vii°</div><div class="chord-name" id="ch-7">-</div></div>
            </div>
        </section>

        <section class="card">
            <h2>Círculo de Quintas</h2>
            <div class="circle-container">
                <svg class="circle-svg" viewBox="0 0 300 300">
                    <circle cx="150" cy="150" r="130" class="circle-bg"/>
                    <circle cx="150" cy="150" r="90" class="circle-bg"/>
                    <g id="circle-elements">
                        </g>
                </svg>
            </div>
        </section>
    </main>

    <script>
        const notas = ['C', 'G', 'D', 'A', 'E', 'B', 'F#', 'C#', 'G#', 'D#', 'A#', 'F'];
        const notasOrdenCronologico = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];

        const relativosMenores = {
            'C': 'Am', 'G': 'Em', 'D': 'Bm', 'A': 'F#m', 'E': 'C#m', 'B': 'G#m',
            'F#': 'D#m', 'C#': 'A#m', 'G#': 'Fm', 'D#': 'Cm', 'A#': 'Gm', 'F': 'Dm'
        };

        function obtenerGradosMayor(tonica) {
            const idx = notasOrdenCronologico.indexOf(tonica);
            const semitonos = [0, 2, 4, 5, 7, 9, 11];
            const grados = semitonos.map(s => notasOrdenCronologico[(idx + s) % 12]);
            
            return [
                grados[0],
                grados[1] + 'm',
                grados[2] + 'm',
                grados[3],
                grados[4],
                grados[5] + 'm',
                grados[6] + 'dim'
            ];
        }

        function actualizarUI(tonica) {
            const acordes = obtenerGradosMayor(tonica);
            for (let i = 0; i < 7; i++) {
                document.getElementById(`ch-${i+1}`).textContent = acordes[i];
            }

            document.querySelectorAll('.btn-nota').forEach(b => {
                b.classList.toggle('active', b.dataset.nota === tonica);
            });
            document.querySelectorAll('.circle-text').forEach(t => {
                t.classList.toggle('active', t.dataset.nota === tonica);
            });
        }

        // Inicializar selectores de notas tipo botonera
        const selectorG = document.getElementById('selector-notas');
        notasOrdenCronologico.forEach(n => {
            const btn = document.createElement('button');
            btn.className = 'btn-nota';
            btn.textContent = n;
            btn.dataset.nota = n;
            btn.addEventListener('click', () => actualizarUI(n));
            selectorG.appendChild(btn);
        });

        // Construir rueda de quintas SVG
        const gCirculo = document.getElementById('circle-elements');
        const cx = 150, cy = 150;

        notas.forEach((n, i) => {
            const angulo = (i * 30 - 90) * Math.PI / 180;
            
            // Textos Mayores (Exterior)
            const tx = cx + 110 * Math.cos(angulo);
            const ty = cy + 110 * Math.sin(angulo);
            const textMaj = document.createElementNS("http://www.w3.org/2000/svg", "text");
            textMaj.setAttribute("x", tx);
            textMaj.setAttribute("y", ty);
            textMaj.className.baseVal = "circle-text";
            textMaj.textContent = n;
            textMaj.dataset.nota = n;
            textMaj.addEventListener('click', () => actualizarUI(n));
            gCirculo.appendChild(textMaj);

            // Textos Menores (Interior)
            const txi = cx + 70 * Math.cos(angulo);
            const tyi = cy + 70 * Math.sin(angulo);
            const textMin = document.createElementNS("http://www.w3.org/2000/svg", "text");
            textMin.setAttribute("x", txi);
            textMin.setAttribute("y", tyi);
            textMin.className.baseVal = "circle-text";
            textMin.style.fontSize = "10px";
            textMin.style.opacity = "0.7";
            textMin.textContent = relativosMenores[n];
            textMin.addEventListener('click', () => actualizarUI(n));
            gCirculo.appendChild(textMin);
            
            // Rayos separadores deliberados
            const anguloLinea = (i * 30 - 105) * Math.PI / 180;
            const lx1 = cx + 50 * Math.cos(anguloLinea);
            const ly1 = cy + 50 * Math.sin(anguloLinea);
            const lx2 = cx + 130 * Math.cos(anguloLinea);
            const ly2 = cy + 130 * Math.sin(anguloLinea);
            const linea = document.createElementNS("http://www.w3.org/2000/svg", "line");
            linea.setAttribute("x1", lx1);
            linea.setAttribute("y1", ly1);
            linea.setAttribute("x2", lx2);
            linea.setAttribute("y2", ly2);
            linea.className.baseVal = "circle-line";
            gCirculo.appendChild(linea);
        });

        // Tonalidad por defecto inicial
        actualizarUI('C');
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/ArmoniaMusical/sw.js')
                    .then(reg => console.log('Service Worker registrado con éxito en:', reg.scope))
                    .catch(err => console.error('Error al registrar el Service Worker:', err));
            });
        }
    </script>
</body>
</html>
