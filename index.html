<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#0a0a0d"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Armonía"/>
  <link rel="apple-touch-icon" href="icons/icon-180.png"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Armonía · Compass Composer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f12;
      color: #e8e4d9;
      font-family: 'Lato', sans-serif;
      min-height: 100vh;
      padding: 24px 16px;
    }

    ::-webkit-scrollbar { height: 4px; width: 4px; background: #1a1a1f; }
    ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

    button { cursor: pointer; font-family: 'Lato', sans-serif; transition: filter 0.15s; }
    button:hover { filter: brightness(1.18); }

    .serif { font-family: 'Playfair Display', serif; }

    .container { max-width: 900px; margin: 0 auto; }

    /* ── Header ────────────────────────────────────────────────────────────────── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 24px;
      border-bottom: 1px solid #222;
      padding-bottom: 12px;
    }
    header h1 { font-size: 24px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
    header .sub { font-size: 13px; color: #7c786c; font-style: italic; margin-left: 8px; }
    .nav-link { color: #8b8678; text-decoration: none; font-size: 13px; transition: color 0.15s; }
    .nav-link:hover { color: #fff; }

    /* ── Workspace Grid ───────────────────────────────────────────────────────── */
    .grid-main {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }
    @media (min-width: 768px) {
      .grid-main { grid-template-columns: 320px 1fr; }
    }

    /* ── Panels ────────────────────────────────────────────────────────────────── */
    .panel {
      background: #131317;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 16px;
    }
    .panel-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #7c786c;
      margin-bottom: 12px;
      font-weight: 700;
    }

    /* ── Controls row ──────────────────────────────────────────────────────────── */
    .control-group { margin-bottom: 14px; }
    .control-group label { display: block; font-size: 11px; color: #666; text-transform: uppercase; margin-bottom: 4px; font-weight: 700; }
    
    .tonic-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
    .btn-tonic {
      background: #1c1c22; border: 1px solid #2d2d35; color: #b5b0a1;
      padding: 8px 0; font-size: 13px; border-radius: 4px; font-weight: 700;
    }
    .btn-tonic.active { background: #e8e4d9; border-color: #e8e4d9; color: #131317; }

    .select-custom {
      width: 100%; background: #1c1c22; border: 1px solid #2d2d35; color: #e8e4d9;
      padding: 8px; font-size: 13px; border-radius: 4px; outline: none;
    }

    .bar-tabs { display: flex; gap: 4px; margin-bottom: 10px; background: #1a1a20; padding: 2px; border-radius: 4px; }
    .tab-item {
      flex: 1; background: transparent; border: none; color: #7c786c; font-size: 12px;
      padding: 6px 0; font-weight: 700; border-radius: 3px;
    }
    .tab-item.active { background: #2d2d38; color: #fff; }

    /* ── Chord Selector Panel ──────────────────────────────────────────────────── */
    .chord-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 16px; }
    .btn-chord-sel {
      background: #1a1a20; border: 1px solid #282830; border-radius: 6px;
      padding: 12px 4px; text-align: center; display: flex; flex-direction: column; gap: 2px;
    }
    .btn-chord-sel .deg { font-size: 10px; color: #666; font-weight: 700; }
    .btn-chord-sel .lbl { font-size: 14px; font-weight: 700; color: #e8e4d9; }
    .btn-chord-sel:hover { border-color: #444; }

    /* ── Progression ───────────────────────────────────────────────────────────── */
    .prog-row { display: flex; flex-wrap: wrap; gap: 8px; min-height: 70px; background: #17171d; border: 1px dashed #2d2d35; border-radius: 6px; padding: 12px; align-items: center; }
    .prog-item {
      background: #22222b; border: 1px solid #3a3a45; border-radius: 6px;
      padding: 8px 12px; display: flex; align-items: center; gap: 8px; animation: pop 0.15s ease-out;
    }
    @keyframes pop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .prog-item .name { font-size: 15px; font-weight: 700; color: #fff; }
    .prog-item .deg { font-size: 10px; color: #7c786c; font-weight: 700; text-transform: uppercase; }
    .prog-item .del { background: transparent; border: none; color: #666; font-size: 14px; padding: 0 2px; }
    .prog-item .del:hover { color: #ff5555; }
    
    .prog-actions { margin-top: 10px; display: flex; gap: 8px; justify-content: flex-end; }
    .btn-action { background: #1a1a20; border: 1px solid #2d2d35; color: #999; font-size: 11px; font-weight: 700; padding: 6px 12px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .btn-action:hover { border-color: #555; color: #fff; }

    /* ── Tablature View ────────────────────────────────────────────────────────── */
    .tab-scroll { overflow-x: auto; background: #0a0a0d; border: 1px solid #1a1a20; border-radius: 6px; padding: 14px; font-family: monospace; font-size: 13px; color: #a5a193; line-height: 1.4; white-space: pre; }

    /* ── Visualization (Fretboard / Keyboard) ────────────────────────────────── */
    .viz-box { background: #0b0b0d; border: 1px solid #1a1a20; border-radius: 6px; padding: 12px; display: flex; justify-content: center; overflow-x: auto; margin-bottom: 16px; }
    .fretboard-wrap { width: 100%; min-width: 500px; }
    #fretboard { width: 100%; }

    /* ── Suggestion Panel ──────────────────────────────────────────────────────── */
    .sug-list { display: flex; flex-direction: column; gap: 6px; }
    .sug-item { display: flex; justify-content: space-between; align-items: center; background: #17171d; border: 1px solid #222; padding: 8px 12px; border-radius: 6px; }
    .sug-meta { display: flex; flex-direction: column; gap: 1px; }
    .sug-chord { font-size: 13px; font-weight: 700; color: #fff; }
    .sug-reason { font-size: 11px; color: #6a665c; }
    .btn-add-sug { background: #222; border: 1px solid #333; color: #aaa; font-size: 11px; font-weight: 700; padding: 4px 8px; border-radius: 4px; }
    .btn-add-sug:hover { background: #e8e4d9; color: #111; border-color: #e8e4d9; }
  </style>
</head>
<body>

<div class="container">
  <header>
    <div>
      <h1 class="serif">Compass Composer<span class="sub">por Armonía</span></h1>
    </div>
    <a href="explorador.html" class="nav-link">Abrir Explorador →</a>
  </header>

  <div class="grid-main">
    <div class="panel-col" style="display:flex; flex-direction:column; gap:16px;">
      <div class="panel">
        <div class="panel-title">Configuración básica</div>
        
        <div class="control-group">
          <label>Tonalidad / Tónica</label>
          <div class="tonic-grid" id="tonic-grid"></div>
        </div>

        <div class="control-group">
          <label>Modo / Escala</label>
          <select class="select-custom" id="mode-select"></select>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">Visualización de acordes</div>
        <div class="bar-tabs" id="instrument-tabs"></div>
        <div class="bar-tabs" id="tuning-tabs"></div>
      </div>

      <div class="panel">
        <div class="panel-title">Sugerencias de Voz</div>
        <div class="sug-list" id="sug-list"></div>
      </div>
    </div>

    <div class="panel-col" style="display:flex; flex-direction:column; gap:16px;">
      
      <div class="viz-box" id="viz-area"></div>

      <div class="panel">
        <div class="panel-title" id="chord-panel-title">Acordes disponibles en la escala</div>
        <div class="chord-row" id="chord-selectors"></div>
      </div>

      <div class="panel">
        <div class="panel-title">Tu Progresión de Acordes</div>
        <div class="prog-row" id="prog-row"></div>
        <div class="prog-actions">
          <button class="btn-action" id="btn-copy" onclick="copyCipher()">Copiar cifrado</button>
          <button class="btn-action" onclick="exportPDF()">Imprimir / PDF</button>
          <button class="btn-action" style="color:#f55;" onclick="clearProgression()">Limpiar todo</button>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">Salida de Tablatura / Guía de Arpegio</div>
        <div class="tab-scroll" id="tab-output"></div>
      </div>

    </div>
  </div>
</div>

<script>
// ── DATA CORE ─────────────────────────────────────────────────────────────────
const NOTES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

const MODES = {
  major: { name: "Mayor (Jónico)", intervals: [0,2,4,5,7,9,11], degrees: ["I","ii","iii","IV","V","vi","vii°"], types: ["maj","min","min","maj","maj","min","dim"] },
  minor: { name: "Menor Natural (Eólico)", intervals: [0,2,3,5,7,8,10], degrees: ["i","ii°","III","iv","v","VI","VII"], types: ["min","dim","maj","min","min","maj","maj"] },
  dorian: { name: "Dórico", intervals: [0,2,3,5,7,9,10], degrees: ["i","ii","III","IV","v","vi°","VII"], types: ["min","min","maj","maj","min","dim","maj"] },
  mixolydian: { name: "Mixolidio", intervals: [0,2,4,5,7,9,10], degrees: ["I","ii","iii°","IV","v","vi","VII"], types: ["maj","min","dim","maj","min","min","maj"] }
};

const INSTRUMENTS = {
  guitar: { name: "Guitarra", strings: [4,9,2,7,11,4], names: ["E","A","D","G","B","E"], frets: 15 },
  bass: { name: "Bajo (4 Cuerdas)", strings: [7,0,5,10], names: ["E","A","D","G"], frets: 15 },
  ukulele: { name: "Ukulele", strings: [7,0,4,9], names: ["G","C","E","A"], frets: 12 },
  keyboard: { name: "Teclado / Piano" }
};

const TUNINGS = {
  guitar: [
    { name: "Estándar E", strings: [4,9,2,7,11,4], names: ["E","A","D","G","B","E"] },
    { name: "Drop D", strings: [2,9,2,7,11,4], names: ["D","A","D","G","B","E"] },
    { name: "Estándar D", strings: [2,7,0,5,9,2], names: ["D","G","C","F","A","D"] }
  ],
  bass: [
    { name: "Estándar E", strings: [7,0,5,10], names: ["E","A","D","G"] },
    { name: "Drop D", strings: [2,0,5,10], names: ["D","A","D","G"] }
  ],
  ukulele: [
    { name: "Estándar G", strings: [7,0,4,9], names: ["G","C","E","A"] }
  ]
};

// State Engine
let state = {
  tonic: "C",
  mode: "major",
  instrument: "guitar",
  tuningIdx: 0,
  progression: []
};

// ── UI ENGINE ─────────────────────────────────────────────────────────────────
function renderTonicGrid() {
  const grid = document.getElementById("tonic-grid");
  grid.innerHTML = "";
  NOTES.forEach(n => {
    const btn = document.createElement("button");
    btn.className = `btn-tonic ${state.tonic === n ? 'active' : ''}`;
    btn.innerText = n;
    btn.onclick = () => { state.tonic = n; renderAll(); };
    grid.appendChild(btn);
  });
}

function renderModeDropdown() {
  const sel = document.getElementById("mode-select");
  sel.innerHTML = "";
  for (let k in MODES) {
    const opt = document.createElement("option");
    opt.value = k;
    opt.innerText = MODES[k].name;
    opt.selected = state.mode === k;
    sel.appendChild(opt);
  }
  sel.onchange = (e) => { state.mode = e.target.value; renderAll(); };
}

function renderInstrumentBar() {
  const bar = document.getElementById("instrument-tabs");
  bar.innerHTML = "";
  for (let k in INSTRUMENTS) {
    const btn = document.createElement("button");
    btn.className = `tab-item ${state.instrument === k ? 'active' : ''}`;
    btn.innerText = INSTRUMENTS[k].name;
    btn.onclick = () => {
      state.instrument = k;
      state.tuningIdx = 0;
      renderAll();
    };
    bar.appendChild(btn);
  }
}

function renderTuningBar() {
  const bar = document.getElementById("tuning-tabs");
  bar.innerHTML = "";
  if (state.instrument === "keyboard") {
    bar.style.display = "none";
    return;
  }
  bar.style.display = "flex";
  const list = TUNINGS[state.instrument] || [];
  list.forEach((t, idx) => {
    const btn = document.createElement("button");
    btn.className = `tab-item ${state.tuningIdx === idx ? 'active' : ''}`;
    btn.innerText = t.name;
    btn.onclick = () => { state.tuningIdx = idx; renderAll(); };
    bar.appendChild(btn);
  });
}

// ── MUSIC MATHS ───────────────────────────────────────────────────────────────
function getScaleNotes() {
  const m = MODES[state.mode];
  const tIdx = NOTES.indexOf(state.tonic);
  return m.intervals.map(i => NOTES[(tIdx + i) % 12]);
}

function getChordNotes(rootNote, type) {
  const rIdx = NOTES.indexOf(rootNote);
  if(type === "maj") return [NOTES[rIdx], NOTES[(rIdx+4)%12], NOTES[(rIdx+7)%12]];
  if(type === "min") return [NOTES[rIdx], NOTES[(rIdx+3)%12], NOTES[(rIdx+7)%12]];
  if(type === "dim") return [NOTES[rIdx], NOTES[(rIdx+3)%12], NOTES[(rIdx+6)%12]];
  return [NOTES[rIdx]];
}

// ── RENDERS CENTRAL WORKSHOP ──────────────────────────────────────────────────
function renderScaleRow() {
  const scaleNotes = getScaleNotes();
  const m = MODES[state.mode];
  const grid = document.getElementById("chord-selectors");
  grid.innerHTML = "";

  scaleNotes.forEach((n, idx) => {
    const type = m.types[idx];
    const deg = m.degrees[idx];
    const label = n + (type==="min"?"m":type==="dim"?"dim":"");

    const btn = document.createElement("button");
    btn.className = "btn-chord-sel";
    btn.innerHTML = `<span class="deg">${deg}</span><span class="lbl">${label}</span>`;
    btn.onclick = () => {
      state.progression.push({ note: n, type: type, degreeLabel: deg });
      renderAll();
    };
    grid.appendChild(btn);
  });
}

// Se asegura de mantener el título contextualizado
function renderChordPanel() {
  document.getElementById("chord-panel-title").innerText = `Acordes disponibles en la escala de ${state.tonic} ${MODES[state.mode].name}`;
}

function renderProgression() {
  const row = document.getElementById("prog-row");
  row.innerHTML = "";
  if(state.progression.length === 0) {
    row.innerHTML = `<span style="color:#555;font-size:13px;font-style:italic">La progresión está vacía. Seleccioná acordes arriba para armar tu secuencia armónica...</span>`;
    return;
  }
  state.progression.forEach((item, idx) => {
    const div = document.createElement("div");
    div.className = "prog-item";
    const label = item.note + (item.type==="min"?"m":item.type==="dim"?"dim":"");
    div.innerHTML = `
      <span class="deg">${item.degreeLabel}</span>
      <span class="name">${label}</span>
      <button class="del" onclick="removeProg(${idx})">&times;</button>
    `;
    row.appendChild(div);
  });
}

function removeProg(idx) {
  state.progression.splice(idx, 1);
  renderAll();
}

function clearProgression() {
  state.progression = [];
  renderAll();
}

// ── VECTOR VIZ ENGINE ────────────────────────────────────────────────────────
function renderViz() {
  if (state.instrument === "keyboard") {
    renderKeyboardSVG();
  } else {
    renderFretboardSVG();
  }
}

function renderFretboardSVG() {
  const svg = document.getElementById("fretboard");
  if(!svg) return;
  svg.innerHTML = "";

  const instMeta = INSTRUMENTS[state.instrument];
  const tuning = TUNINGS[state.instrument][state.tuningIdx];
  const numStrings = tuning.strings.length;
  const numFrets = instMeta.frets;

  const width = svg.clientWidth || 550;
  const height = 150;
  svg.setAttribute("viewBox", `0 0 ${width} ${height}`);

  const paddingLeft = 30;
  const paddingTop = 15;
  const fSpace = (width - paddingLeft) / numFrets;
  const sSpace = (height - (paddingTop * 2)) / (numStrings - 1);

  for (let f = 0; f <= numFrets; f++) {
    const x = paddingLeft + (f * fSpace);
    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    line.setAttribute("x1", x); line.setAttribute("y1", paddingTop);
    line.setAttribute("x2", x); line.setAttribute("y2", height - paddingTop);
    line.setAttribute("stroke", f === 0 ? "#8b8678" : "#333");
    line.setAttribute("stroke-width", f === 0 ? "4" : "1");
    svg.appendChild(line);

    if([3,5,7,9,12,15].includes(f)) {
      const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
      txt.setAttribute("x", x - (fSpace/2)); txt.setAttribute("y", height - 2);
      txt.setAttribute("fill", "#555"); txt.setAttribute("font-size", "10");
      txt.setAttribute("text-anchor", "middle");
      txt.textContent = f;
      svg.appendChild(txt);
    }
  }

  let activeNotes = [];
  if(state.progression.length > 0) {
    const last = state.progression[state.progression.length - 1];
    activeNotes = getChordNotes(last.note, last.type);
  }

  for (let s = 0; s < numStrings; s++) {
    const y = paddingTop + (s * sSpace);
    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    line.setAttribute("x1", paddingLeft); line.setAttribute("y1", y);
    line.setAttribute("x2", width); line.setAttribute("y2", y);
    line.setAttribute("stroke", "#444");
    line.setAttribute("stroke-width", 1 + (s * 0.4));
    svg.appendChild(line);

    const openNoteIdx = tuning.strings[numStrings - 1 - s];
    const openNoteName = tuning.names[numStrings - 1 - s];
    
    const lbl = document.createElementNS("http://www.w3.org/2000/svg", "text");
    lbl.setAttribute("x", 10); lbl.setAttribute("y", y + 4);
    lbl.setAttribute("fill", "#7c786c"); lbl.setAttribute("font-size", "11");
    lbl.setAttribute("font-weight", "700");
    lbl.textContent = openNoteName;
    svg.appendChild(lbl);

    for (let f = 0; f < numFrets; f++) {
      const noteAtFret = NOTES[(openNoteIdx + f) % 12];
      if (activeNotes.includes(noteAtFret)) {
        const isRoot = noteAtFret === activeNotes[0];
        const cx = paddingLeft + (f * fSpace) + (fSpace / 2);
        
        const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        circle.setAttribute("cx", cx); circle.setAttribute("cy", y);
        circle.setAttribute("r", 9);
        circle.setAttribute("fill", isRoot ? "#e8e4d9" : "#2d2d38");
        circle.setAttribute("stroke", isRoot ? "#131317" : "#444");
        svg.appendChild(circle);

        const nTxt = document.createElementNS("http://www.w3.org/2000/svg", "text");
        nTxt.setAttribute("x", cx); nTxt.setAttribute("y", y + 3.5);
        nTxt.setAttribute("fill", isRoot ? "#111" : "#fff");
        nTxt.setAttribute("font-size", "9"); nTxt.setAttribute("font-weight", "700");
        nTxt.setAttribute("text-anchor", "middle");
        nTxt.textContent = noteAtFret;
        svg.appendChild(nTxt);
      }
    }
  }
}

function renderKeyboardSVG() {
  const area = document.getElementById("viz-area");
  area.innerHTML = '<svg id="keyboard-svg" height="120" style="width:100%; max-width:500px;"></svg>';
  const svg = document.getElementById("keyboard-svg");
  
  const width = 500;
  const height = 120;
  svg.setAttribute("viewBox", `0 0 ${width} ${height}`);

  let activeNotes = [];
  if(state.progression.length > 0) {
    const last = state.progression[state.progression.length - 1];
    activeNotes = getChordNotes(last.note, last.type);
  }

  const numWhiteKeys = 17;
  const wWidth = width / numWhiteKeys;

  const whiteKeyPattern = ["C", "D", "E", "F", "G", "A", "B"];
  const b
